---
- name: Validate local prerequisites for AAP bootstrap
  hosts: localhost
  gather_facts: false
  vars_files:
    - vars/aap_api.yml

  tasks:
    - name: Confirm Ansible can run locally
      ansible.builtin.debug:
        msg: "Local Ansible execution is working."

    - name: Validate local command line tools
      ansible.builtin.command:
        cmd: "{{ item }}"
      changed_when: false
      loop:
        - ansible-playbook --version
        - ansible-galaxy --version
      loop_control:
        label: "{{ item }}"

    - name: Probe AAP platform gateway and controller APIs
      ansible.builtin.include_tasks: tasks/probe_aap_api.yml

    - name: Show prerequisite validation result
      ansible.builtin.debug:
        msg:
          - "AAP endpoint: {{ aap_base_url }}"
          - "SSL verification: {{ aap_validate_certs_effective }}"
          - "Required API checks passed for platform gateway and automation controller."
