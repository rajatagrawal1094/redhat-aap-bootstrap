---
credentials:
  - name: Demo Linux Machine Credential
    organization: Platform Engineering
    credential_type: Machine
    description: Example only. Real values must come from Vault, SOPS, or local private variables.
    inputs:
      username: cloud-user
      ssh_key_data: "{{ vault_demo_linux_ssh_key | default('REPLACE_WITH_PRIVATE_SECRET') }}"

  - name: Demo GitHub Source Control
    organization: Platform Engineering
    credential_type: Source Control
    description: Example only. Use a scoped token in real environments.
    inputs:
      username: git
      password: "{{ vault_github_token | default('REPLACE_WITH_PRIVATE_SECRET') }}"
